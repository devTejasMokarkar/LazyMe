
<style>
  * { box-sizing: border-box; }
  .container { padding: 1.5rem 0; font-family: var(--font-sans); }
  .header { margin-bottom: 1.5rem; }
  .header h2 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 4px; }
  .header p { font-size: 14px; color: var(--color-text-secondary); margin: 0; }
  .token-bar { display: flex; gap: 8px; margin-bottom: 1.25rem; align-items: center; }
  .token-bar input { flex: 1; font-size: 13px; padding: 0 10px; height: 36px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-family: var(--font-mono); }
  .token-bar button { height: 36px; padding: 0 14px; font-size: 13px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; white-space: nowrap; }
  .token-bar button:hover { background: var(--color-background-secondary); }
  .search-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 8px; margin-bottom: 8px; }
  .filter-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 1.25rem; }
  .search-row input, .filter-row input, .filter-row select { height: 36px; padding: 0 10px; font-size: 13px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); font-family: var(--font-sans); }
  .filter-row select { cursor: pointer; }
  .btn-search { height: 36px; padding: 0 20px; font-size: 14px; font-weight: 500; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .btn-search:hover { background: var(--color-background-secondary); }
  .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }
  .status { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 1rem; min-height: 18px; }
  .status.error { color: var(--color-text-danger); }
  .jobs-grid { display: flex; flex-direction: column; gap: 10px; }
  .job-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; transition: border-color 0.15s; }
  .job-card:hover { border-color: var(--color-border-secondary); }
  .job-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 3px; }
  .job-company { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 8px; }
  .job-meta { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .tag { font-size: 12px; padding: 3px 9px; border-radius: 99px; border: 0.5px solid var(--color-border-tertiary); color: var(--color-text-secondary); background: var(--color-background-secondary); }
  .tag.exp { color: #0C447C; background: #E6F1FB; border-color: #B5D4F4; }
  .tag.sal { color: #085041; background: #E1F5EE; border-color: #9FE1CB; }
  .job-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .job-date { font-size: 12px; color: var(--color-text-tertiary); }
  .job-actions { display: flex; gap: 6px; }
  .btn-link { font-size: 12px; padding: 5px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; }
  .btn-link:hover { background: var(--color-background-secondary); }
  .btn-apply { font-size: 12px; padding: 5px 12px; border-radius: var(--border-radius-md); border: 0.5px solid #B5D4F4; background: #E6F1FB; color: #0C447C; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; font-weight: 500; }
  .btn-apply:hover { background: #B5D4F4; }
  .btn-debug { font-size: 11px; padding: 3px 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); background: transparent; color: var(--color-text-tertiary); cursor: pointer; }
  .btn-debug:hover { background: var(--color-background-secondary); }
  .debug-panel { margin-top: 8px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 10px; font-size: 11px; font-family: var(--font-mono); color: var(--color-text-secondary); white-space: pre-wrap; word-break: break-all; max-height: 160px; overflow-y: auto; display: none; }
  .empty { text-align: center; padding: 3rem 1rem; color: var(--color-text-secondary); font-size: 14px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--color-border-secondary); border-top-color: var(--color-text-primary); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .token-saved { font-size: 12px; color: #085041; }
</style>

<div class="container">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Naukri job search powered by Apify</h2>
  <div class="header">
    <h2>Naukri job search</h2>
    <p>Powered by Apify · muhammetakkurtt/naukri-job-scraper</p>
  </div>

  <div class="token-bar">
    <input type="password" id="apiToken" placeholder="Paste your Apify API token…" autocomplete="off" />
    <button onclick="saveToken()"><i class="ti ti-device-floppy" aria-hidden="true"></i> Save</button>
    <span class="token-saved" id="tokenSaved" style="display:none"><i class="ti ti-check"></i> Saved</span>
  </div>

  <div class="search-row">
    <input type="text" id="keyword" placeholder="Job title or keyword (e.g. React Developer)" />
    <input type="text" id="location" placeholder="Location (e.g. Mumbai, Bangalore)" />
    <button class="btn-search" id="searchBtn" onclick="searchJobs()">
      <i class="ti ti-search" aria-hidden="true"></i> Search
    </button>
  </div>
  <div class="filter-row">
    <input type="text" id="minSalary" placeholder="Min salary (e.g. 5)" />
    <input type="text" id="maxSalary" placeholder="Max salary (e.g. 20)" />
    <select id="expFilter">
      <option value="">Any experience</option>
      <option value="0">Fresher (0 yrs)</option>
      <option value="1">1+ year</option>
      <option value="2">2+ years</option>
      <option value="3">3+ years</option>
      <option value="5">5+ years</option>
      <option value="8">8+ years</option>
    </select>
  </div>

  <div class="status" id="status"></div>
  <div class="jobs-grid" id="jobsGrid">
    <div class="empty"><i class="ti ti-briefcase" style="font-size:32px;display:block;margin-bottom:8px;opacity:0.3" aria-hidden="true"></i>Enter your Apify token and search for jobs</div>
  </div>
</div>

<script>
let savedToken = '';
let rawItems = [];

function saveToken() {
  const val = document.getElementById('apiToken').value.trim();
  if (!val) return;
  savedToken = val;
  document.getElementById('tokenSaved').style.display = 'inline';
  setTimeout(() => document.getElementById('tokenSaved').style.display = 'none', 2000);
}

function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function extractUrl(job) {
  const candidates = [
    job.url, job.jobUrl, job.link, job.applyUrl, job.applyLink,
    job.jobLink, job.detailUrl, job.pageUrl, job.href,
    job.externalApplyLink, job.applyNowLink, job.redirectUrl
  ];
  for (const c of candidates) {
    if (c && typeof c === 'string' && c.startsWith('http')) return c;
  }
  if (job.jdURL) return job.jdURL;
  if (job.jobId) return `https://www.naukri.com/job-listings-${job.jobId}`;
  return null;
}

function toggleDebug(id) {
  const panel = document.getElementById('debug-' + id);
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function renderJobs(jobs) {
  rawItems = jobs;
  const grid = document.getElementById('jobsGrid');
  if (!jobs || jobs.length === 0) {
    grid.innerHTML = '<div class="empty">No jobs found. Try different keywords or filters.</div>';
    return;
  }
  grid.innerHTML = jobs.map((job, idx) => {
    const title = job.title || job.jobTitle || job.designation || 'Untitled';
    const company = job.company || job.companyName || job.employer || '';
    const loc = Array.isArray(job.location) ? job.location.join(', ') : (job.location || job.jobLocation || job.city || '');
    const exp = job.experience || job.minExp || job.experienceRange || '';
    const sal = job.salary || job.salaryRange || job.ctc || '';
    const posted = job.postedOn || job.postedDate || job.postedAt || '';
    const skills = Array.isArray(job.skills) ? job.skills.slice(0,4) : (Array.isArray(job.keySkills) ? job.keySkills.slice(0,4) : []);
    const jobUrl = extractUrl(job);
    const debugJson = JSON.stringify(Object.keys(job).reduce((acc, k) => {
      const v = job[k];
      if (typeof v === 'string' && v.startsWith('http')) acc[k] = v;
      else if (k.toLowerCase().includes('url') || k.toLowerCase().includes('link') || k.toLowerCase().includes('id')) acc[k] = v;
      return acc;
    }, {}), null, 2);

    return `<div class="job-card">
      <p class="job-title">${escHtml(title)}</p>
      <p class="job-company">${escHtml(company)}${loc ? ' &middot; ' + escHtml(loc) : ''}</p>
      <div class="job-meta">
        ${exp ? `<span class="tag exp"><i class="ti ti-briefcase" style="font-size:11px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>${escHtml(String(exp))}</span>` : ''}
        ${sal ? `<span class="tag sal"><i class="ti ti-currency-rupee" style="font-size:11px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>${escHtml(String(sal))}</span>` : ''}
        ${skills.map(s => `<span class="tag">${escHtml(s)}</span>`).join('')}
      </div>
      <div class="job-footer">
        <span class="job-date">${posted ? 'Posted: ' + escHtml(String(posted)) : ''}</span>
        <div class="job-actions">
          <button class="btn-debug" onclick="toggleDebug(${idx})">🔍 debug</button>
          ${jobUrl
            ? `<a class="btn-link" href="${escHtml(jobUrl)}" target="_blank"><i class="ti ti-eye" aria-hidden="true"></i> View</a>
               <a class="btn-apply" href="${escHtml(jobUrl)}" target="_blank"><i class="ti ti-external-link" aria-hidden="true"></i> Apply now</a>`
            : `<span class="btn-link" style="opacity:0.4;cursor:default">No link found</span>`
          }
        </div>
      </div>
      <div class="debug-panel" id="debug-${idx}">${escHtml(debugJson)}</div>
    </div>`;
  }).join('');
}

async function searchJobs() {
  const token = savedToken || document.getElementById('apiToken').value.trim();
  if (!token) { setStatus('Please enter and save your Apify API token first.', true); return; }
  const keyword = document.getElementById('keyword').value.trim();
  const location = document.getElementById('location').value.trim();
  const minSal = document.getElementById('minSalary').value.trim();
  const maxSal = document.getElementById('maxSalary').value.trim();
  const exp = document.getElementById('expFilter').value;
  if (!keyword) { setStatus('Please enter a job title or keyword.', true); return; }

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Searching…';
  setStatus('Starting Apify actor run, this may take 30–60 seconds…');
  document.getElementById('jobsGrid').innerHTML = '';

  try {
    const input = { position: keyword };
    if (location) input.location = location;
    if (minSal) input.minSalary = Number(minSal);
    if (maxSal) input.maxSalary = Number(maxSal);
    if (exp) input.experienceMin = Number(exp);

    const runRes = await fetch(`https://api.apify.com/v2/acts/muhammetakkurtt~naukri-job-scraper/runs?token=${token}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(input)
    });

    if (!runRes.ok) {
      const err = await runRes.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error ${runRes.status}`);
    }

    const runData = await runRes.json();
    const runId = runData.data?.id;
    if (!runId) throw new Error('No run ID returned from Apify.');

    setStatus('Actor running… checking status.');
    await pollRun(runId, token);
  } catch (e) {
    setStatus('Error: ' + e.message, true);
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-search" aria-hidden="true"></i> Search';
  }
}

async function pollRun(runId, token) {
  const btn = document.getElementById('searchBtn');
  for (let i = 0; i < 30; i++) {
    await new Promise(r => setTimeout(r, 4000));
    const statusRes = await fetch(`https://api.apify.com/v2/actor-runs/${runId}?token=${token}`);
    const statusData = await statusRes.json();
    const status = statusData.data?.status;

    if (status === 'SUCCEEDED') {
      const datasetId = statusData.data?.defaultDatasetId;
      setStatus('Fetching results…');
      const itemsRes = await fetch(`https://api.apify.com/v2/datasets/${datasetId}/items?token=${token}&limit=30`);
      const items = await itemsRes.json();
      setStatus(`Found ${items.length} job${items.length !== 1 ? 's' : ''}.`);
      renderJobs(items);
      btn.disabled = false;
      btn.innerHTML = '<i class="ti ti-search" aria-hidden="true"></i> Search';
      return;
    } else if (status === 'FAILED' || status === 'ABORTED' || status === 'TIMED-OUT') {
      throw new Error(`Actor run ${status.toLowerCase()}.`);
    } else {
      setStatus(`Actor status: ${status}… (checking again in 4s)`);
    }
  }
  throw new Error('Timed out waiting for actor to finish. Try again.');
}
</script>
